<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>จิกซอ | เน็ตดอยมินิเกม</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #ffd700; }
    html, body { height: 100%; background: radial-gradient(ellipse at 50% 20%, #1e0b4a 0%, #0a0a1a 70%); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }

    .screen { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px 16px; gap: 14px; overflow-y: auto; }
    .screen.active { display: flex; }

    .home-btn { position: fixed; top: max(10px, env(safe-area-inset-top)); left: 12px; font-size: 11px; font-weight: 900; letter-spacing: 2px; color: var(--gold); text-decoration: none; z-index: 300; background: rgba(0,0,0,.45); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,215,0,.3); }

    .title { font-size: clamp(20px,5vw,34px); font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,.4); text-align: center; }
    .subtitle { font-size: 13px; color: rgba(255,255,255,.4); letter-spacing: 1px; text-align: center; }
    .btn { padding: 11px 28px; font-size: 14px; font-weight: 800; border: none; border-radius: 50px; cursor: pointer; font-family: inherit; transition: transform .15s, box-shadow .15s, opacity .15s; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-gold { background: linear-gradient(135deg, var(--gold), #ff8c00); color: #1a0a2e; }
    .btn-gold:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,165,0,.5); }
    .btn-gray { background: rgba(255,255,255,.12); color: rgba(255,255,255,.8); }
    .btn-gray:hover { background: rgba(255,255,255,.2); }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

    /* image select */
    .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px; width: 100%; max-width: 540px; }
    .img-card { border-radius: 12px; overflow: hidden; border: 2px solid rgba(255,255,255,.15); cursor: pointer; transition: border-color .2s, transform .15s; }
    .img-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    .img-card.selected { border-color: var(--gold); box-shadow: 0 0 18px rgba(255,215,0,.4); }
    .img-card img { width: 100%; height: 90px; object-fit: cover; display: block; }
    .img-card-name { font-size: 10px; color: rgba(255,255,255,.6); text-align: center; padding: 5px 4px; background: rgba(0,0,0,.45); }

    /* diff */
    .diff-wrap { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .diff-card { background: rgba(255,255,255,.06); border: 2px solid rgba(255,255,255,.15); border-radius: 14px; padding: 16px 20px; cursor: pointer; transition: border-color .2s, background .2s; text-align: center; min-width: 110px; }
    .diff-card:hover, .diff-card.sel { border-color: var(--gold); background: rgba(255,215,0,.08); }
    .diff-label { font-size: 15px; font-weight: 800; color: var(--gold); }
    .diff-sub { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 3px; }

    /* game */
    #gameScreen { padding: 0; justify-content: flex-start; overflow: hidden; }
    .topbar { width: 100%; height: 50px; background: rgba(0,0,0,.65); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 12px; flex-shrink: 0; padding-top: env(safe-area-inset-top); }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .timer { font-size: 18px; font-weight: 900; color: var(--gold); min-width: 58px; letter-spacing: 1px; }
    .prog { font-size: 12px; color: rgba(255,255,255,.45); }
    .topbar-right { display: flex; align-items: center; gap: 6px; }
    .icon-btn { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: #fff; border-radius: 20px; padding: 5px 11px; font-size: 12px; cursor: pointer; font-family: inherit; }
    .icon-btn:hover { background: rgba(255,255,255,.2); }

    #boardArea { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px; overflow: hidden; }
    #board { position: relative; touch-action: none; }
    .cell {
      position: absolute;
      background-repeat: no-repeat;
      border: 1px solid rgba(0,0,0,.4);
      cursor: grab;
      transition: transform .12s, box-shadow .12s, border-color .12s, opacity .15s;
      will-change: transform;
    }
    .cell.correct { border-color: rgba(0,200,80,.5); box-shadow: inset 0 0 0 2px rgba(0,200,80,.3); }
    .cell.dragging-src { opacity: .35; cursor: grabbing; }
    .cell.drag-over { border-color: var(--gold) !important; box-shadow: 0 0 14px rgba(255,215,0,.7) !important; transform: scale(1.04); }

    #ghost { position: fixed; pointer-events: none; z-index: 999; border-radius: 3px; border: 2px solid var(--gold); box-shadow: 0 6px 24px rgba(0,0,0,.7); opacity: .88; display: none; background-repeat: no-repeat; }

    /* preview overlay */
    #prevOv { position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 500; display: none; align-items: center; justify-content: center; }
    #prevOv.on { display: flex; }
    #prevOv img { max-width: 92vw; max-height: 88vh; object-fit: contain; border-radius: 12px; border: 2px solid rgba(255,215,0,.4); }

    /* complete */
    .res-time { font-size: 52px; font-weight: 900; color: var(--gold); letter-spacing: 2px; }
    .res-sub { font-size: 13px; color: rgba(255,255,255,.45); }
    .rank-badge { font-size: 26px; font-weight: 900; }
    .lb-wrap { width: 100%; max-width: 360px; overflow-y: auto; max-height: 240px; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; color: rgba(255,255,255,.4); letter-spacing: 1px; padding: 7px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.1); }
    td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,.06); font-size: 13px; }
    tr.me td { color: var(--gold); font-weight: 700; }
    tr.r1 td:first-child::before { content: '🥇 '; }
    tr.r2 td:first-child::before { content: '🥈 '; }
    tr.r3 td:first-child::before { content: '🥉 '; }
  </style>
</head>
<body>
<a class="home-btn" href="/">NETDOI</a>
<div id="ghost"></div>
<div id="prevOv" onclick="this.classList.remove('on')"><img id="prevImg" src="" alt=""></div>

<!-- Select image -->
<div id="selScreen" class="screen">
  <div class="title">🧩 จิกซอ</div>
  <div class="subtitle">เลือกภาพที่ต้องการต่อ</div>
  <div class="img-grid" id="imgGrid"></div>
  <button class="btn btn-gold" id="selNext" disabled>เลือกความยาก →</button>
</div>

<!-- Difficulty -->
<div id="diffScreen" class="screen">
  <div class="title">เลือกความยาก</div>
  <div style="width:200px;height:128px;border-radius:12px;overflow:hidden;border:2px solid rgba(255,215,0,.4)">
    <img id="diffPrev" style="width:100%;height:100%;object-fit:cover" src="" alt="">
  </div>
  <div class="diff-wrap">
    <div class="diff-card" data-d="easy">  <div class="diff-label">ง่าย</div>      <div class="diff-sub">3×3 · 9 ชิ้น</div>  </div>
    <div class="diff-card" data-d="medium"><div class="diff-label">ปานกลาง</div>  <div class="diff-sub">4×4 · 16 ชิ้น</div> </div>
    <div class="diff-card" data-d="hard">  <div class="diff-label">ยาก</div>       <div class="diff-sub">6×6 · 36 ชิ้น</div> </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-gray" id="diffBack">← กลับ</button>
    <button class="btn btn-gold" id="diffStart" disabled>เริ่มเลย!</button>
  </div>
</div>

<!-- Game -->
<div id="gameScreen" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="timer" id="timer">0:00</div>
      <div class="prog" id="prog"></div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="prevBtn">👁</button>
      <button class="icon-btn" id="fsBtn">⛶</button>
    </div>
  </div>
  <div id="boardArea"><div id="board"></div></div>
</div>

<!-- Complete -->
<div id="doneScreen" class="screen">
  <div class="title">🎉 สำเร็จ!</div>
  <div class="res-time" id="resTime"></div>
  <div class="res-sub"  id="resSub"></div>
  <div class="rank-badge" id="rankBadge"></div>
  <div style="font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2px">TOP 10</div>
  <div class="lb-wrap"><table><thead><tr><th>#</th><th>ชื่อ</th><th>เวลาดีสุด</th></tr></thead><tbody id="lbBody"></tbody></table></div>
  <div class="btn-row">
    <button class="btn btn-gold" id="replayBtn">เล่นอีกครั้ง</button>
    <button class="btn btn-gray" id="changeBtn">เปลี่ยนภาพ</button>
  </div>
</div>

<script>
const TOKEN_KEY = 'netdoiToken';
const IMAGES = [
  { file:'6432.jpg', name:'Hikvision ColorVu' },
  { file:'6433.jpg', name:'Hikvision AcuSense' },
  { file:'6434.jpg', name:'Dahua Monitor' },
  { file:'6435.jpg', name:'EZVIZ Solar' },
  { file:'6436.jpg', name:'EZVIZ Smart Home' },
];
const DIFFS = { easy:{cols:3,rows:3}, medium:{cols:4,rows:4}, hard:{cols:6,rows:6} };

let selImg = null, selDiff = null;
let grid = [], cols = 0, rows = 0, bW = 0, bH = 0;
let placedOk = 0, timerSec = 0, timerInt = null;
let myUser = null;
let dragSrc = null; // { r, c }

function tok() { return localStorage.getItem(TOKEN_KEY); }
function fmt(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === id)); }

// ── Auth ──────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const token = tok();
  if (!token) { window.location.href = '/'; return; }
  try {
    const p = JSON.parse(atob(token.split('.')[1]));
    if (p.exp * 1000 <= Date.now()) { localStorage.removeItem(TOKEN_KEY); window.location.href = '/'; return; }
    myUser = p.username;
  } catch { window.location.href = '/'; return; }
  buildImgGrid();
  show('selScreen');
});

// ── Image select ──────────────────────────────────────────────────────────────
function buildImgGrid() {
  const g = document.getElementById('imgGrid');
  IMAGES.forEach(img => {
    const c = document.createElement('div');
    c.className = 'img-card';
    c.innerHTML = `<img src="./images/${img.file}" alt="${img.name}" loading="lazy"><div class="img-card-name">${img.name}</div>`;
    c.addEventListener('click', () => {
      g.querySelectorAll('.img-card').forEach(x => x.classList.remove('selected'));
      c.classList.add('selected');
      selImg = img;
      document.getElementById('selNext').disabled = false;
    });
    g.appendChild(c);
  });
}
document.getElementById('selNext').addEventListener('click', () => {
  if (!selImg) return;
  document.getElementById('diffPrev').src = `./images/${selImg.file}`;
  document.querySelectorAll('.diff-card').forEach(c => c.classList.remove('sel'));
  selDiff = null;
  document.getElementById('diffStart').disabled = true;
  show('diffScreen');
});

// ── Diff select ───────────────────────────────────────────────────────────────
document.querySelectorAll('.diff-card').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.diff-card').forEach(x => x.classList.remove('sel'));
    c.classList.add('sel');
    selDiff = c.dataset.d;
    document.getElementById('diffStart').disabled = false;
  });
});
document.getElementById('diffBack').addEventListener('click', () => show('selScreen'));
document.getElementById('diffStart').addEventListener('click', startGame);

// ── Start game ────────────────────────────────────────────────────────────────
function startGame() {
  if (!selImg || !selDiff) return;
  const cfg = DIFFS[selDiff];
  cols = cfg.cols; rows = cfg.rows;
  placedOk = 0; timerSec = 0; dragSrc = null;
  clearInterval(timerInt);
  document.getElementById('timer').textContent = '0:00';
  show('gameScreen');

  const img = new Image();
  img.onload = () => {
    const aspect = img.naturalWidth / img.naturalHeight;
    const area = document.getElementById('boardArea');
    const maxW = area.clientWidth  - 8;
    const maxH = area.clientHeight - 8;
    if (maxW / aspect <= maxH) { bW = maxW; bH = Math.round(maxW / aspect); }
    else { bH = maxH; bW = Math.round(maxH * aspect); }
    bW = Math.floor(bW / cols) * cols;
    bH = Math.floor(bH / rows) * rows;

    // Init shuffled grid
    const pw = bW / cols, ph = bH / rows;
    const flat = [];
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) flat.push({ ir: r, ic: c });
    // Fisher-Yates shuffle (ensure not solved)
    do {
      for (let i = flat.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [flat[i], flat[j]] = [flat[j], flat[i]];
      }
    } while (isSolved(flat));

    grid = [];
    for (let r = 0; r < rows; r++) grid.push(flat.slice(r * cols, r * cols + cols));

    renderBoard();
    countCorrect();
    document.getElementById('prevImg').src = `./images/${selImg.file}`;
    timerInt = setInterval(() => { timerSec++; document.getElementById('timer').textContent = fmt(timerSec); }, 1000);
  };
  img.src = `./images/${selImg.file}`;
}

function isSolved(flat) {
  return flat.every((p, i) => p.ir === Math.floor(i / cols) && p.ic === i % cols);
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  board.style.width  = bW + 'px';
  board.style.height = bH + 'px';
  const pw = bW / cols, ph = bH / rows;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const p = grid[r][c];
      const cell = document.createElement('div');
      cell.className = 'cell' + (p.ir === r && p.ic === c ? ' correct' : '');
      cell.style.cssText = `
        left:${c*pw}px; top:${r*ph}px;
        width:${pw}px; height:${ph}px;
        background-image:url('./images/${selImg.file}');
        background-size:${bW}px ${bH}px;
        background-position:${-(p.ic*pw)}px ${-(p.ir*ph)}px;
      `;
      cell.dataset.r = r; cell.dataset.c = c;
      cell.addEventListener('pointerdown', onPointerDown);
      board.appendChild(cell);
    }
  }
}

function cellAt(r, c) {
  return document.querySelector(`#board .cell[data-r="${r}"][data-c="${c}"]`);
}
function countCorrect() {
  let n = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) if (grid[r][c].ir === r && grid[r][c].ic === c) n++;
  placedOk = n;
  document.getElementById('prog').textContent = `${n} / ${cols * rows}`;
}

// ── Drag to swap ──────────────────────────────────────────────────────────────
const ghost = document.getElementById('ghost');
let overCell = null;

function onPointerDown(e) {
  e.preventDefault();
  const cell = e.currentTarget;
  const r = +cell.dataset.r, c = +cell.dataset.c;
  dragSrc = { r, c };
  const pw = bW / cols, ph = bH / rows;

  // Setup ghost
  const p = grid[r][c];
  ghost.style.cssText = `
    display:block; width:${pw}px; height:${pw}px;
    background-image:url('./images/${selImg.file}');
    background-size:${bW}px ${bH}px;
    background-position:${-(p.ic*pw)}px ${-(p.ir*ph)}px;
    width:${pw}px; height:${ph}px;
    transform:translate(-50%,-50%) scale(1.08);
  `;
  moveGhost(e);
  cell.classList.add('dragging-src');

  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup',   onPointerUp,   { once: true });
  document.addEventListener('pointercancel', onPointerUp, { once: true });
}

function moveGhost(e) {
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  ghost.style.left = cx + 'px';
  ghost.style.top  = cy + 'px';
}

function onPointerMove(e) {
  e.preventDefault();
  moveGhost(e);
  // Find cell under pointer
  ghost.style.display = 'none';
  const cx = e.clientX, cy = e.clientY;
  const el = document.elementFromPoint(cx, cy);
  ghost.style.display = 'block';

  // Clear prev over
  if (overCell) { overCell.classList.remove('drag-over'); overCell = null; }

  if (el && el.classList.contains('cell')) {
    const tr = +el.dataset.r, tc = +el.dataset.c;
    if (tr !== dragSrc.r || tc !== dragSrc.c) {
      el.classList.add('drag-over');
      overCell = el;
    }
  }
}

function onPointerUp(e) {
  document.removeEventListener('pointermove', onPointerMove);
  ghost.style.display = 'none';
  if (overCell) { overCell.classList.remove('drag-over'); }

  if (dragSrc && overCell) {
    const tr = +overCell.dataset.r, tc = +overCell.dataset.c;
    const { r: sr, c: sc } = dragSrc;
    // Swap
    [grid[sr][sc], grid[tr][tc]] = [grid[tr][tc], grid[sr][sc]];
    renderBoard();
    countCorrect();
    if (placedOk === cols * rows) { clearInterval(timerInt); setTimeout(onComplete, 300); }
  } else if (dragSrc) {
    // Just released on same cell — clear src highlight
    const cell = cellAt(dragSrc.r, dragSrc.c);
    if (cell) cell.classList.remove('dragging-src');
  }

  dragSrc = null; overCell = null;
}

// ── Preview ───────────────────────────────────────────────────────────────────
document.getElementById('prevBtn').addEventListener('click', () => document.getElementById('prevOv').classList.add('on'));

// ── Fullscreen ────────────────────────────────────────────────────────────────
const fsBtn = document.getElementById('fsBtn');
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.() || document.documentElement.webkitRequestFullscreen?.();
  } else {
    document.exitFullscreen?.() || document.webkitExitFullscreen?.();
  }
});
document.addEventListener('fullscreenchange',       updateFsBtn);
document.addEventListener('webkitfullscreenchange', updateFsBtn);
function updateFsBtn() {
  fsBtn.textContent = (document.fullscreenElement || document.webkitFullscreenElement) ? '✕' : '⛶';
}

// ── Complete ──────────────────────────────────────────────────────────────────
async function onComplete() {
  const t = timerSec;
  document.getElementById('resTime').textContent = fmt(t);
  document.getElementById('resSub').textContent  = `${selImg.name} · ${{ easy:'ง่าย', medium:'ปานกลาง', hard:'ยาก' }[selDiff]}`;
  document.getElementById('rankBadge').textContent = '';
  document.getElementById('lbBody').innerHTML = '<tr><td colspan="3" style="text-align:center;color:rgba(255,255,255,.3);padding:14px">กำลังโหลด…</td></tr>';
  show('doneScreen');

  const token = tok();
  if (token) {
    try {
      await fetch('/api/jigsaw/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ image: selImg.file, difficulty: selDiff, time_sec: t }),
      });
    } catch {}
  }

  try {
    const res = await fetch(`/api/jigsaw/leaderboard?image=${selImg.file}&difficulty=${selDiff}`,
      { headers: token ? { Authorization: 'Bearer ' + token } : {} });
    const { top10, me, myBest, myRank } = await res.json();
    const tb = document.getElementById('lbBody');
    tb.innerHTML = '';
    top10.forEach((row, i) => {
      const tr = document.createElement('tr');
      tr.className = ['r1','r2','r3'][i] || '';
      if (row.username === me) tr.className += ' me';
      tr.innerHTML = `<td>${i+1}</td><td>${row.username}</td><td>${fmt(row.best)}</td>`;
      tb.appendChild(tr);
    });
    if (myRank !== null) {
      document.getElementById('rankBadge').textContent =
        myRank === 1 ? '🥇 อันดับ 1!' : myRank === 2 ? '🥈 อันดับ 2' : myRank === 3 ? '🥉 อันดับ 3' : `อันดับที่ ${myRank}`;
      if (myRank > 10) {
        const sep = document.createElement('tr');
        sep.innerHTML = '<td colspan="3" style="text-align:center;color:rgba(255,255,255,.2);font-size:10px;padding:3px">· · ·</td>';
        const tr = document.createElement('tr');
        tr.className = 'me';
        tr.innerHTML = `<td>${myRank}</td><td>${me}</td><td>${fmt(myBest)}</td>`;
        tb.appendChild(sep); tb.appendChild(tr);
      }
    }
  } catch { document.getElementById('lbBody').innerHTML = '<tr><td colspan="3" style="text-align:center;color:rgba(255,255,255,.3)">โหลดไม่ได้</td></tr>'; }
}

document.getElementById('replayBtn').addEventListener('click', startGame);
document.getElementById('changeBtn').addEventListener('click', () => show('selScreen'));
</script>
</body>
</html>
