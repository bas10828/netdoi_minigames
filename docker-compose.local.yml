services:
  hub:
    ports:
      - "8081:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - slave

  slave:
    environment:
      POSTGRES_URI: "postgres://netdoi:netdoi@db:5432/netdoi"
      JWT_SECRET: "local-dev-secret"
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: netdoi
      POSTGRES_PASSWORD: netdoi
      POSTGRES_DB: netdoi
    volumes:
      - netdoi_pg_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netdoi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  netdoi_pg_local:
