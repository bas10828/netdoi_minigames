services:
  hub:
    image: nginx:alpine
    container_name: netdoi_minigames_hub
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./numtao:/usr/share/nginx/html/numtao:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  slave:
    build: ./slave
    container_name: netdoi_minigames_slave
    env_file:
      - ./slave/.env
    restart: unless-stopped
